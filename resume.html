  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const container = document.getElementById('pdf-container');
        const errorMsg = document.getElementById('pdf-error');

        pdfjsLib.getDocument('https://raw.githubusercontent.com/KavimugilRajasekar/AssetsHosting/main/Kavimugil_Rajasekar_Resume.pdf').promise.then(function(pdf) {
          const pagesNeeded = Math.min(pdf.numPages, 2);
          for (let i = 1; i <= pagesNeeded; i++) {
            pdf.getPage(i).then(function(page) {
              const scale = 1.5;
              const viewport = page.getViewport({ scale: scale });
              const canvas = document.createElement('canvas');
              canvas.height = viewport.height;
              canvas.width = viewport.width;
              canvas.style.margin = '0 auto';
              canvas.style.display = 'block';
              container.appendChild(canvas);
              page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
            });
          }
        }).catch(function() {
          container.style.display = 'none';
          errorMsg.style.display = 'block';
        });
      } else {
        document.getElementById('pdf-container').style.display = 'none';
        document.getElementById('pdf-error').style.display = 'block';
      }
    });
  </script>
